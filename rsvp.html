</audio>

<!-- =========== RSVP =========== -->
<section id="rsvp" class="section rsvp-page-section">
  <div class="ornament-sep" data-aos="fade-up"></div>
  <h2 class="section-title" data-aos="fade-up">RSVP</h2>
  <p class="section-sub" data-aos="fade-up">Your presence is our blessing</p>
  <form class="rsvp-form glass" id="rsvpForm" data-aos="fade-up">
    <div class="row">
      <input required name="name" placeholder="Your Name" />
      <input required type="number" min="1" max="20" name="guests" placeholder="No. of Guests" />
    </div>
    <div class="row">
      <select name="attending" required>
        <option value="">Will you attend?</option>
        <option>Joyfully accepts</option>
        <option>Regretfully declines</option>
      </select>
      <select name="event">
        <option value="">Which events?</option>
        <option>All ceremonies</option>
        <option>Wedding only</option>
        <option>Reception only</option>
      </select>
    </div>
    <textarea name="message" rows="3" placeholder="Leave a blessing or message..."></textarea>
    <button class="btn-royal shimmer" type="submit">Send RSVP</button>
    <p class="rsvp-thanks" id="rsvpThanks" hidden>🌸 Thank you! Your blessings are received.</p>
  </form>
</section>

<!-- =========== FOOTER =========== -->
